name: Daily AI Newsroom

on:
  schedule:
    # 11:00 UTC = 7:00 AM ET. Adjust to your preferred delivery time.
    - cron: "43 07 * * *"
  workflow_dispatch: {}   # manual trigger from the Actions tab

jobs:
  daily-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # pipeline takes ~10 min; this is a safety cap

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install Claude Code CLI
        # The Agent SDK spawns a `claude` subprocess — npm gives us that binary.
        # Node is pre-installed on ubuntu-latest, so this is a one-liner.
        run: npm install -g @anthropic-ai/claude-code@latest

      - name: Run AI Newsroom pipeline
        env:
          # CLAUDE_CODE_OAUTH_TOKEN: the long-lived token from `claude setup-token`.
          # Store it in GitHub → Settings → Secrets → Actions as CLAUDE_CODE_OAUTH_TOKEN.
          # The Agent SDK reads this env var directly — no `claude auth login` needed.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m src.main

      - name: Publish episode to portfolio
        # Pushes the day's MP3 + a small manifest into the portfolio repo so the
        # site's play button serves today's episode. Needs PORTFOLIO_DEPLOY_TOKEN:
        # a fine-grained PAT with Contents: write on GuptaIshika25.github.io,
        # stored in this repo's Settings → Secrets → Actions.
        if: success()
        env:
          PORTFOLIO_DEPLOY_TOKEN: ${{ secrets.PORTFOLIO_DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          TODAY=$(date -u +%F)
          MP3="output/ai-newsroom-${TODAY}.mp3"
          if [ ! -f "$MP3" ]; then
            echo "No episode at ${MP3} — nothing to publish, skipping."
            exit 0
          fi
          git clone --depth 1 \
            "https://x-access-token:${PORTFOLIO_DEPLOY_TOKEN}@github.com/GuptaIshika25/GuptaIshika25.github.io.git" \
            portfolio
          mkdir -p portfolio/audio
          cp "$MP3" portfolio/audio/latest.mp3
          SPOKEN_DATE=$(date -u -d "${TODAY}" +"%B %-d, %Y")
          cat > portfolio/audio/episode.json <<EOF
          {
            "title": "AI News Brief · ${SPOKEN_DATE}",
            "date": "${TODAY}",
            "file": "latest.mp3"
          }
          EOF
          cd portfolio
          git config user.name "ai-newsroom-bot"
          git config user.email "actions@users.noreply.github.com"
          git add audio/latest.mp3 audio/episode.json
          git commit -m "Publish AI News Brief for ${TODAY}" || { echo "No changes to publish."; exit 0; }
          git push origin HEAD:main
